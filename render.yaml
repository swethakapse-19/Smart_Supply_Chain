services:
  # ── Node.js Data Backend ─────────────────────────────────
  - type: web
    name: supply-chain-api
    runtime: node
    rootDir: backend/api-node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        value: # Add your MongoDB Atlas URI here
      - key: NEO4J_URI
        value: # Add your Neo4j Bolt URI here (e.g. bolt+s://xxx.databases.neo4j.io)
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASSWORD
        value: # Add your Neo4j Password here
    plan: free

  # ── Python FastAPI AI Backend ─────────────────────────────
  - type: web
    name: supply-chain-ai
    runtime: python
    rootDir: backend/api-python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10001
    plan: free
