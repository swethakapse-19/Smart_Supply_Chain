<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SupplySense AI - Resilient Logistics & Real-time Supply Chain Optimization" />
  <title>SupplySense AI Dashboard</title>
  
  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for standalone JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #020617;
      --bg-card: rgba(30, 41, 59, 0.7);
      --bg-card-hover: rgba(30, 41, 59, 0.9);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-blue: #3b82f6;
      --accent-blue-glow: rgba(59, 130, 246, 0.5);
      --accent-green: #10b981;
      --accent-green-glow: rgba(16, 185, 129, 0.5);
      --accent-yellow: #f59e0b;
      --accent-red: #ef4444;
      --accent-red-glow: rgba(239, 68, 68, 0.5);
      --accent-purple: #8b5cf6;
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Outfit', sans-serif; }
    
    body {
      background: radial-gradient(circle at top right, #1e1b4b, #020617);
      color: var(--text-main);
      min-height: 100vh;
      overflow: hidden;
    }

    .dashboard-container {
      display: grid;
      grid-template-columns: 320px 1fr 380px;
      grid-template-rows: 80px 1fr;
      height: 100vh;
      gap: 1.5rem;
      padding: 1.5rem;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .header {
      grid-column: 1 / -1;
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 0 2rem;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
    }

    .header h1 {
      font-size: 1.75rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: linear-gradient(to right, #fff, var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header h1 span {
      color: var(--accent-blue);
      -webkit-text-fill-color: var(--accent-blue);
      text-shadow: 0 0 20px var(--accent-blue-glow);
    }

    .map-section {
      background: var(--bg-card);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
    }

    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      overflow-y: auto;
      padding-right: 0.5rem;
    }

    .side-panel::-webkit-scrollbar { width: 6px; }
    .side-panel::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

    .card {
      background: var(--bg-card);
      backdrop-filter: blur(8px);
      padding: 1.5rem;
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card:hover { border-color: rgba(255, 255, 255, 0.2); }

    .card-title {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .fleet-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    
    .fleet-item {
      padding: 1rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
    }
    
    .fleet-item:hover { background: rgba(255, 255, 255, 0.08); }
    .fleet-item.active {
      background: rgba(59, 130, 246, 0.15);
      border-color: var(--accent-blue);
    }
    .fleet-item.danger {
      background: rgba(239, 68, 68, 0.15);
      border-color: var(--accent-red);
      animation: pulse-danger 2s infinite;
    }

    @keyframes pulse-danger {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    .telemetry-log {
      max-height: 200px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    
    .log-item {
      padding: 0.5rem;
      background: rgba(0,0,0,0.2);
      border-radius: 6px;
      border-left: 2px solid var(--accent-blue);
      animation: fadeIn 0.3s;
    }
    .log-item.warning { border-left-color: var(--accent-yellow); color: var(--accent-yellow); }
    .log-item.critical { border-left-color: var(--accent-red); color: #fca5a5; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .stat-box {
      background: rgba(255, 255, 255, 0.03);
      padding: 1rem;
      border-radius: 14px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.4rem; }
    .stat-value { font-size: 1.1rem; font-weight: 700; color: #fff; }

    .risk-gauge {
      height: 10px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      margin-top: 1rem;
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .risk-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.5s;
    }

    .risk-level-green { background: linear-gradient(to right, #059669, #10b981); box-shadow: 0 0 15px var(--accent-green-glow); }
    .risk-level-yellow { background: linear-gradient(to right, #d97706, #f59e0b); box-shadow: 0 0 15px rgba(245, 158, 11, 0.3); }
    .risk-level-red { background: linear-gradient(to right, #dc2626, #ef4444); box-shadow: 0 0 20px var(--accent-red-glow); }

    .alert-box {
      background: rgba(239, 68, 68, 0.08);
      border-left: 4px solid var(--accent-red);
      padding: 1rem;
      border-radius: 12px;
      margin-top: 1rem;
      animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
    }

    @keyframes shake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }

    .recommendation {
      background: rgba(16, 185, 129, 0.08);
      border-left: 4px solid var(--accent-green);
      padding: 1rem;
      border-radius: 12px;
      margin-top: 1rem;
      display: none;
    }

    .recommendation.active { display: block; animation: slideInUp 0.4s cubic-bezier(0, 0, 0.2, 1); }
    @keyframes slideInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .demo-btn {
      background: linear-gradient(135deg, var(--accent-red), #b91c1c);
      color: white;
      border: none;
      padding: 0.8rem 1.75rem;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }
    .demo-btn.reset { background: linear-gradient(135deg, var(--accent-blue), #6366f1); box-shadow: 0 4px 12px rgba(54, 117, 246, 0.3); }

    .optimize-btn {
      background: linear-gradient(to right, #059669, #10b981);
      color: white;
      border: none;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      width: 100%;
      font-weight: 700;
      cursor: pointer;
      margin-top: 1rem;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
      transition: transform 0.2s;
    }
    .optimize-btn:active { transform: scale(0.98); }

    .leaflet-container { background: #020617 !important; height: 100%; width: 100%; }
    
    /* custom icon styles for leaflet */
    .truck-icon {
      background: var(--accent-blue);
      border: 2px solid white;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
    .truck-icon.danger {
      background: var(--accent-red);
      box-shadow: 0 0 15px var(--accent-red);
      animation: pulse-danger 1s infinite;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Data Definitions ---
    const INITIAL_TRUCKS = {
      "TRK101": {
        id: "TRK101", source: "Hyderabad", destination: "Bangalore", current_idx: 1, 
        route: [[17.3850, 78.4867], [15.8281, 78.0373], [12.9716, 77.5946]], 
        detour_route: [[17.3850, 78.4867], [16.5, 77.0], [14.0, 77.0], [12.9716, 77.5946]],
        speed: 65, weather: "Clear", traffic_level: "Low", delay_risk: 15, eta: "5.0 hours", 
        current_route: "NH44 (Standard)", isDisrupted: false, isOptimized: false, color: '#3b82f6'
      },
      "TRK102": {
        id: "TRK102", source: "Mumbai", destination: "Pune", current_idx: 1, 
        route: [[19.0760, 72.8777], [18.7481, 73.4001], [18.5204, 73.8567]], 
        detour_route: [[19.0760, 72.8777], [18.8, 73.2], [18.5204, 73.8567]],
        speed: 55, weather: "Clear", traffic_level: "Moderate", delay_risk: 25, eta: "2.5 hours", 
        current_route: "Mumbai Highway", isDisrupted: false, isOptimized: false, color: '#f59e0b'
      },
      "TRK103": {
        id: "TRK103", source: "Chennai", destination: "Nellore", current_idx: 1, 
        route: [[13.0827, 80.2707], [13.5937, 80.0234], [14.4426, 79.9865]], 
        detour_route: [[13.0827, 80.2707], [13.8, 79.8], [14.4426, 79.9865]],
        speed: 60, weather: "Clear", traffic_level: "Low", delay_risk: 10, eta: "3.2 hours", 
        current_route: "NH16", isDisrupted: false, isOptimized: false, color: '#8b5cf6'
      }
    };

    function App() {
      const [trucks, setTrucks] = useState(INITIAL_TRUCKS);
      const [selectedId, setSelectedId] = useState("TRK101");
      const [scenario, setScenario] = useState('normal'); 
      const [telemetry, setTelemetry] = useState([
        { id: 1, time: new Date().toLocaleTimeString(), msg: "System Boot... Real-time tracking engaged." }
      ]);
      
      const mapRef = useRef(null);
      const layersRef = useRef({});

      useEffect(() => {
        if(window.lucide) window.lucide.createIcons();
      });

      const addLog = (msg, type="info") => {
        setTelemetry(prev => [{ id: Date.now(), time: new Date().toLocaleTimeString(), msg, type }, ...prev].slice(0, 15));
      };

      // Telemetry Simulation
      useEffect(() => {
        if(scenario === 'normal') {
          const interval = setInterval(() => {
            const msgs = ["Telemetry: Heartbeat OK", "Traffic anomaly scan: None", "Weather check: Clear skies"];
            addLog(msgs[Math.floor(Math.random()*msgs.length)]);
          }, 4000);
          return () => clearInterval(interval);
        }
      }, [scenario]);

      // Handle Disruption Simulation
      const toggleScenario = async () => {
        if (scenario === 'normal') {
          setScenario('disrupted');
          addLog("WARNING: Sudden weather event detected near Kurnool (TRK101)", "warning");
          
          try {
            // Fetch risk from API as per problem statement "preemptively detect"
            const r = await fetch('http://localhost:8000/api/predict', {
               method: 'POST',
               headers: { 'Content-Type': 'application/json' },
               body: JSON.stringify({ speed: 25, weather: "Heavy Rain", traffic: "High" })
            });
            const res = await r.json();
            
            setTrucks(prev => ({
              ...prev,
              "TRK101": {
                ...prev["TRK101"],
                isDisrupted: true,
                speed: 25, weather: "Heavy Rain", traffic_level: "High", eta: "8.5 hours",
                delay_risk: res.delay_risk_percentage || 87 
              }
            }));
            
            addLog("CRITICAL: TRK101 hidden operational bottleneck identified. Delay Risk > 85%", "critical");
            setSelectedId("TRK101"); // Auto focus
            
          } catch(e) {
            console.error("Backend not reachable.");
            setTrucks(prev => ({
              ...prev, "TRK101": { ...prev["TRK101"], isDisrupted: true, speed: 25, delay_risk: 87, eta: "8.5 hours", traffic_level: "High" }
            }));
            addLog("CRITICAL (Fallback): TRK101 hidden bottleneck identified. Risk 87%", "critical");
            setSelectedId("TRK101");
          }
        } else {
          setScenario('normal');
          setTrucks(INITIAL_TRUCKS);
          addLog("System reset to normal operations.");
        }
      };

      const executeRouteOptimization = async () => {
        const truck = trucks[selectedId];
        addLog(`Initiating dynamic optimization for ${selectedId}...`);
        try {
            const r = await fetch(`http://localhost:8000/api/optimize/${selectedId}`);
            const res = await r.json();
            
            setTrucks(prev => ({
              ...prev,
              [selectedId]: {
                ...prev[selectedId],
                isOptimized: true,
                current_route: res.suggested_route,
                eta: res.suggested_eta,
                delay_risk: 35
              }
            }));
            addLog(`SUCCESS: ${selectedId} re-routed to ${res.suggested_route}. Time saved: ${res.time_saved}`, "info");
        } catch(e) {
            setTrucks(prev => ({
              ...prev,
              [selectedId]: {
                ...prev[selectedId],
                isOptimized: true,
                current_route: "Alternative Detour Fallback",
                eta: "6.0 hours",
                delay_risk: 35
              }
            }));
            addLog(`SUCCESS (Fallback): ${selectedId} optimized locally.`, "info");
        }
      };

      // Leaflet Map Initialization & Rendering
      useEffect(() => {
        if (!mapRef.current) {
          const map = L.map('map-wrapper', { zoomControl: false }).setView([16.5, 76.5], 6);
          L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
          mapRef.current = map;
        }

        const map = mapRef.current;
        
        // Clear old layers
        Object.values(layersRef.current).forEach(layer => map.removeLayer(layer));
        layersRef.current = {};

        // Render each truck
        Object.values(trucks).forEach(truck => {
           let polylineColor = truck.color;
           let dashArray = null;
           let currentPath = truck.route;
           let truckClass = 'truck-icon';

           if (truck.isOptimized) {
               currentPath = truck.detour_route;
               polylineColor = '#10b981'; // Green for optimized
               dashArray = '10, 10';
           } else if (truck.isDisrupted) {
               polylineColor = '#ef4444'; // Red for disrupted
               dashArray = '5, 10';
               truckClass = 'truck-icon danger';
           }

           const path = L.polyline(currentPath, {color: polylineColor, weight: 3, dashArray}).addTo(map);
           layersRef.current[`${truck.id}_path`] = path;

           const customIcon = L.divIcon({
              className: truckClass,
              html: `<div style="width:14px;height:14px;border-radius:50%;background:${polylineColor}"></div>`,
              iconSize: [18, 18],
              iconAnchor: [9, 9]
           });

           const marker = L.marker(currentPath[truck.current_idx], {icon: customIcon})
             .addTo(map).bindPopup(`<strong>${truck.id}</strong><br>${truck.source} → ${truck.destination}`);
           layersRef.current[`${truck.id}_marker`] = marker;
           
           if(truck.id === selectedId) {
              marker.openPopup();
           }
        });

      }, [trucks, selectedId]);

      const selTruck = trucks[selectedId];

      return (
        <div className="dashboard-container">
          <header className="header">
            <h1 style={{display:'flex', alignItems:'center', gap:'10px'}}>
               <i data-lucide="activity" style={{width:'28px', height:'28px', color:'var(--accent-blue)'}}></i> 
               SupplySense <span>AI</span>
            </h1>
            <button className={`demo-btn ${scenario==='disrupted'?'reset':''}`} onClick={toggleScenario}>
              {scenario === 'normal' ? "Simulate Disruption Event" : "Reset System"}
            </button>
          </header>

          <aside className="side-panel left-panel">
            <div className="card">
              <div className="card-title"><i data-lucide="monitor"></i> Concurrent Fleet</div>
              <div className="fleet-list">
                {Object.values(trucks).map(t => (
                  <div key={t.id} 
                       className={`fleet-item ${selectedId === t.id ? 'active' : ''} ${t.isDisrupted && !t.isOptimized ? 'danger': ''}`}
                       onClick={() => setSelectedId(t.id)}>
                    <div>
                       <strong style={{display:'block'}}>{t.id}</strong>
                       <span style={{fontSize:'0.75rem', color:'var(--text-muted)'}}>{t.source} → {t.destination}</span>
                    </div>
                    {t.isDisrupted && !t.isOptimized ? <i data-lucide="alert-triangle" style={{color:'#ef4444'}}></i> : <i data-lucide="check-circle" style={{color: t.isOptimized ? '#10b981' : '#3b82f6'}}></i>}
                  </div>
                ))}
              </div>
            </div>

            <div className="card" style={{flex: 1, display: 'flex', flexDirection: 'column'}}>
              <div className="card-title"><i data-lucide="terminal"></i> Event Logs</div>
              <div className="telemetry-log">
                 {telemetry.map(log => (
                    <div key={log.id} className={`log-item ${log.type}`}>
                       <span style={{opacity:0.5, marginRight:'5px'}}>[{log.time}]</span>
                       {log.msg}
                    </div>
                 ))}
              </div>
            </div>
          </aside>

          <main className="map-section">
            <div id="map-wrapper"></div>
          </main>

          <aside className="side-panel">
            <div className="card">
              <div className="card-title"><i data-lucide="truck"></i> Shipment Info</div>
              <h2 style={{ fontSize: '1.5rem', fontWeight: 800 }}>{selTruck.id}</h2>
              <p style={{ color: 'var(--text-muted)', fontSize: '0.9rem', marginBottom: '1rem' }}>{selTruck.source} → {selTruck.destination}</p>
              <div className="stats-grid">
                <div className="stat-box"><div className="stat-label">Speed</div><div className="stat-value">{selTruck.speed} km/h</div></div>
                <div className="stat-box"><div className="stat-label">Traffic</div><div className="stat-value">{selTruck.traffic_level}</div></div>
              </div>
            </div>

            <div className="card">
              <div className="card-title"><i data-lucide="shield-alert"></i> AI Risk Prediction</div>
              <div style={{ textAlign: 'center', fontSize: '3rem', fontWeight: 900 }}>{selTruck.delay_risk}%</div>
              <div className="risk-gauge">
                <div className={`risk-fill ${selTruck.delay_risk < 40 ? 'risk-level-green' : selTruck.delay_risk < 70 ? 'risk-level-yellow' : 'risk-level-red'}`} style={{ width: `${selTruck.delay_risk}%` }}></div>
              </div>
              {selTruck.isDisrupted && !selTruck.isOptimized && selTruck.delay_risk > 70 && (
                 <div className="alert-box">
                    <strong style={{display:'block', marginBottom:'5px'}}><i data-lucide="alert-octagon" style={{width:'18px', display:'inline-block'}}></i> Bottleneck Detected</strong>
                    <p style={{fontSize:'0.85rem'}}>Critical transit disruption identified preemptively.</p>
                 </div>
              )}
            </div>

            <div className="card" style={{flex: 1}}>
              <div className="card-title"><i data-lucide="route"></i> Dynamic Optimization</div>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '1rem' }}>
                <span style={{color:'var(--text-muted)'}}>Current ETA</span><strong>{selTruck.eta}</strong>
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '1rem' }}>
                <span style={{color:'var(--text-muted)'}}>Active Route</span><strong style={{textAlign:'right', maxWidth:'60%'}}>{selTruck.current_route}</strong>
              </div>
              
              {selTruck.isDisrupted && !selTruck.isOptimized && (
                 <div className="recommendation active">
                   <strong style={{display:'block', marginBottom:'5px'}}><i data-lucide="zap" style={{width:'16px', display:'inline-block'}}></i> Optimized Route Available</strong>
                   <p style={{fontSize:'0.85rem', marginBottom:'10px'}}>Execute instantly to prevent cascade delays.</p>
                   <button className="optimize-btn" onClick={executeRouteOptimization}>Instant Execute Re-route</button>
                 </div>
              )}
              {selTruck.isOptimized && (
                <div style={{ color: 'var(--accent-green)', textAlign: 'center', padding:'1rem', background:'rgba(16,185,129,0.1)', borderRadius:'8px', border:'1px solid var(--accent-green)' }}>
                   <i data-lucide="check-circle" style={{display:'block', margin:'0 auto 5px auto'}}></i>
                   Robust mechanism completely bypassed bottleneck. Route successfully adjusted.
                </div>
              )}
            </div>
          </aside>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    setTimeout(() => { if(window.lucide) lucide.createIcons(); }, 300);
  </script>
</body>
</html>
